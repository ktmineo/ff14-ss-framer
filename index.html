<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 Photo Framer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <div class="controls">
            <h2 class="app-title">FF14 Photo Framer</h2>

            <div class="control-group image-control">
                <label>Image</label>
                <button type="button" id="selectImageBtn" class="file-select-button">Select Image</button>
                <input type="file" id="upload" accept="image/*">
            </div>

            <div class="control-group aspect-control">
                <label>1. Aspect Ratio</label>
                <div class="toggle-group">
                    <button id="setStandard" class="active">Standard</button>
                    <button id="setWide">Wide</button>
                    <button id="setSquare">Square</button>
                </div>
            </div>

            <div class="control-group orientation-control">
                <label>2. Orientation</label>
                <div class="toggle-group" id="orientationGroup">
                    <button id="setVertical" class="active">Vertical</button>
                    <button id="setHorizontal">Horizontal</button>
                </div>
            </div>

            <div class="control-group filter-control">
                <label>3. Select Filter</label>
                <div id="filterSelector"></div>
            </div>

            <div class="control-group strength-control">
                <label>4. Filter Strength</label>
                <input type="range" id="filterRange" min="0" max="100" value="50">
            </div>

            <div class="control-group text-control">
                <label>5. Info Text (Auto Region)</label>
                <input type="text" id="posInput" placeholder="Location Name ( 0.0 , 0.0 )" maxlength="100">
            </div>

            <div class="control-group post-control">
                <label>6. Post Text</label>
                <textarea id="xPostText" rows="3"></textarea>
            </div>

            <button id="downloadBtn">Export Image</button>
            <button id="copyBtn">Copy Text for X</button>
        </div>

        <div class="preview-area" id="dropZone">
            <canvas id="mainCanvas"></canvas>
            <button type="button" id="dropHint" class="drop-hint">Select Image</button>
            <button type="button" id="changeImageBtn" class="preview-file-button">Change Image</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
